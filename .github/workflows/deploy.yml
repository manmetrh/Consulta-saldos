name: Publicar buscador de saldos

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install pandas openpyxl

      - name: Generar JSON desde Excel
        run: python scripts/generar_saldos_json.py

      - name: Preparar sitio
        run: |
          mkdir -p site/assets
          cp consulta-saldos.html site/index.html
          cp assets/saldos.json site/assets/saldos.json
          cp assets/saldos-procesados.csv site/assets/saldos-procesados.csv

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
